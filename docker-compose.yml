services:
  # One-shot init container: bind mounts are owned by the host user/root, but the
  # nexora process runs as the unprivileged uid 100/gid 101. Chown the writable
  # mounts to that uid/gid so folder creation and uploads succeed. Runs as root,
  # exits immediately, and the nexora service waits for it.
  nexora-init:
    image: alpine:3.20
    container_name: nexora-init
    restart: "no"
    command: ["sh", "-c", "chown -R 100:101 /mnt/files /mnt/backups /mnt/shared && chmod -R 775 /mnt/files /mnt/backups /mnt/shared && echo initialized"]
    volumes:
      - ./data/files:/mnt/files
      - ./data/backups:/mnt/backups
      - ./data/shared:/mnt/shared

  nexora:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "1.4"
    image: nexora:latest
    container_name: nexora
    restart: unless-stopped
    depends_on:
      nexora-init:
        condition: service_completed_successfully
    # Load configuration from the .env file in this directory.
    env_file:
      - .env
    environment:
      NEXORA_DATA_DIR: /app/data
      NEXORA_DATABASE_PATH: /app/data/nexora.db
      NEXORA_THUMBNAIL_CACHE_DIR: /app/data/cache/thumbnails
      NEXORA_WEB_ROOT: /app/web
      NEXORA_LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    volumes:
      # Persistent application data (SQLite DB, config, cache).
      - nexora-data:/app/data
      # User-managed storage bind mounts. Adjust the left side to your host paths.
      - ./data/files:/mnt/files
      - ./data/media:/mnt/media:ro
      - ./data/backups:/mnt/backups
      - ./data/shared:/mnt/shared
      - /data:/mnt/data
    # Read-only root filesystem with tmpfs for scratch space.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Optional resource limits for low-spec hosts (uncomment to enable):
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "1.0"
    #       memory: 512M

volumes:
  nexora-data:
    driver: local
